services:
  - type: web
    name: studio-happens-sign
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_APP_URL
        value: https://sign.studiohappens.tech
      # Control-plane Supabase (platform project) + secrets — set in dashboard.
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: AUTH_SECRET
        sync: false
