services:
  - type: web
    name: studio-happens-sign
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SUPABASE_BUCKET
        value: documents
      - key: NEXT_PUBLIC_APP_URL
        value: https://sign.studiohappens.tech
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: AUTH_SECRET
        sync: false
