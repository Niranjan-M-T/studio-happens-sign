services:
  - type: web
    name: studio-happens-sign
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_APP_URL
        value: https://sign.studiohappens.tech
      # Control-plane Supabase (platform project) + secrets — set in dashboard.
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: AUTH_SECRET
        sync: false
      # Platform Resend key — for auth OTP emails (signup + password-change).
      - key: RESEND_API_KEY
        sync: false
      # Optional: custom From address. Defaults to onboarding@resend.dev sandbox.
      - key: RESEND_FROM
        sync: false
      # Guest mode (no-signup documents). Create a "guest-documents" bucket in
      # the control Supabase and run db/schema.sql on it first.
      - key: GUEST_STORAGE_BUCKET
        value: guest-documents
      # Secret to protect the /api/cleanup endpoint (called by cron-job.org daily).
      - key: CLEANUP_SECRET
        sync: false
