name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Placeholders so the build succeeds without real secrets — same
          # fallback lib/supabase.ts uses for local builds.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder-key
          ADMIN_PASSWORD_HASH: "$2b$12$placeholderplaceholderplaceholderplaceholderpl"
          AUTH_SECRET: placeholder-auth-secret-placeholder-auth-secret
